<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔨 Whack-a-Mole Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="game-header">
            <h1>🔨 WHACK-A-MOLE 🔨</h1>
        </header>

        <!-- Score and Timer -->
        <div class="info-panel">
            <div class="score-display">
                <span class="label">Score:</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="timer-display">
                <span class="label">Time:</span>
                <span id="timer" class="value">30s</span>
            </div>
        </div>

        <!-- Difficulty Selector -->
        <div class="difficulty-panel">
            <h3>🎯 Select Difficulty:</h3>
            <div class="difficulty-buttons">
                <button class="difficulty-btn" data-difficulty="easy">
                    <span class="diff-label">🟢 Easy</span>
                    <span class="diff-desc">Slower moles</span>
                </button>
                <button class="difficulty-btn active" data-difficulty="medium">
                    <span class="diff-label">🟡 Medium</span>
                    <span class="diff-desc">Balanced</span>
                </button>
                <button class="difficulty-btn" data-difficulty="hard">
                    <span class="diff-label">🔴 Hard</span>
                    <span class="diff-desc">Lightning fast!</span>
                </button>
            </div>
        </div>

        <!-- Game Board -->
        <div class="game-board" id="gameBoard">
            <!-- Grid will be generated by JavaScript -->
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="startButton" class="start-button">START GAME</button>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <h3>How to Play:</h3>
            <p>🐹 Click on the moles as they appear to score points!</p>
            <p>⏱️ You have 30 seconds to get the highest score!</p>
            <p>🎯 Each mole is worth 10 points!</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
